version: "3.8"

networks:
  cdc_network:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:

services:

  # ─────────────────────────────────────────
  # OLTP SOURCE — PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres_oltp
    restart: unless-stopped
    environment:
      POSTGRES_USER: oltp_user
      POSTGRES_PASSWORD: oltp_password
      POSTGRES_DB: transactions_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_scripts:/docker-entrypoint-initdb.d  # SQL init scripts go here
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"        # Required for Debezium CDC
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    networks:
      - cdc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oltp_user -d transactions_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # ZOOKEEPER — Required by Kafka
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - cdc_network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # KAFKA — Message Broker
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # External access
      - "29092:29092"     # Internal access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - cdc_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # KAFKA CONNECT + DEBEZIUM — CDC Engine
  # ─────────────────────────────────────────
  kafka_connect:
    image: debezium/connect:2.4
    container_name: kafka_connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"   # REST API to register connectors
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: cdc_connect_group
      CONFIG_STORAGE_TOPIC: cdc_connect_configs
      OFFSET_STORAGE_TOPIC: cdc_connect_offsets
      STATUS_STORAGE_TOPIC: cdc_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    networks:
      - cdc_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # KAFKA UI — Monitor Topics & Messages
  # ─────────────────────────────────────────
  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka_connect:8083
    networks:
      - cdc_network

  # ─────────────────────────────────────────
  # DATA WAREHOUSE — ClickHouse
  # ─────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    environment:
      CLICKHOUSE_USER: ch_user
      CLICKHOUSE_PASSWORD: ch_password
      CLICKHOUSE_DB: warehouse
    volumes:
      - ./clickhouse/data:/var/lib/clickhouse
      - ./clickhouse/logs:/var/log/clickhouse-server
      - ./clickhouse/init:/docker-entrypoint-initdb.d   # SQL init scripts
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - cdc_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # PYTHON CONSUMER — Kafka → ClickHouse
  # ─────────────────────────────────────────
  python_consumer:
    build:
      context: ./consumer         # Your consumer app directory
      dockerfile: Dockerfile
    container_name: python_consumer
    restart: unless-stopped
    depends_on:
      kafka_connect:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_PREFIX: "postgres.public"   # Debezium topic naming pattern
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ch_user
      CLICKHOUSE_PASSWORD: ch_password
      CLICKHOUSE_DB: warehouse
    networks:
      - cdc_network

  # ─────────────────────────────────────────
  # DBT — Transformations (run manually or via Airflow)
  # ─────────────────────────────────────────
  dbt:
    image: ghcr.io/dbt-labs/dbt-clickhouse:1.7.0
    container_name: dbt
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./dbt_project:/usr/app/dbt    # Your dbt project directory
    working_dir: /usr/app/dbt
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ch_user
      CLICKHOUSE_PASSWORD: ch_password
      CLICKHOUSE_DB: warehouse
    entrypoint: ["tail", "-f", "/dev/null"]   # Keep alive; exec in to run dbt commands
    networks:
      - cdc_network

  # ─────────────────────────────────────────
  # AIRFLOW — Orchestration
  # ─────────────────────────────────────────
  airflow:
    image: apache/airflow:2.8.0
    container_name: airflow
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://oltp_user:oltp_password@postgres/transactions_db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "supersecretkey"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: standalone
    networks:
      - cdc_network

  # ─────────────────────────────────────────
  # GRAFANA — Visualization & Dashboards
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource   # Official ClickHouse plugin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning  # Auto-provision datasources & dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - cdc_network