networks:
  cdc_network:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  clickhouse_data:
  clickhouse_logs:
  grafana_data:
  airflow_logs:

services:
  postgres:
    image: postgres:18
    container_name: postgres_oltp
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${PSQL_USER}"
      POSTGRES_PASSWORD: "${PSQL_PASSWORD}"
      POSTGRES_DB: "${PSQL_TRANSACTIONS_DB}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init_scripts:/docker-entrypoint-initdb.d  # SQL init scripts go here
      - "/Users/sardorb/Documents/pprocessing_cdc/data:/data"
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"        # Required for Debezium CDC
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    networks:
      - cdc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PSQL_USER} -d ${PSQL_TRANSACTIONS_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:8.0.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"       # External (host) access
      - "29092:29092"     # Internal (container) access
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"   # Valid base64 UUID — change if needed
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - cdc_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka_connect:
    image: quay.io/debezium/connect:3.1
    container_name: kafka_connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"   # REST API to register/manage connectors
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: cdc_connect_group
      CONFIG_STORAGE_TOPIC: cdc_connect_configs
      OFFSET_STORAGE_TOPIC: cdc_connect_offsets
      STATUS_STORAGE_TOPIC: cdc_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    networks:
      - cdc_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka_connect:8083
    networks:
      - cdc_network

  clickhouse:
    image: clickhouse/clickhouse-server:26.1
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface (used by Python consumer, dbt, Grafana)
      - "9000:9000"   # Native TCP interface
    environment:
      CLICKHOUSE_USER: "${CH_USER}"
      CLICKHOUSE_PASSWORD: "${CH_PASSWORD}"
      CLICKHOUSE_DB: "${CH_DB}"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse/init:/docker-entrypoint-initdb.d   # SQL init scripts
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - cdc_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    image: apache/airflow:3.1.7
    container_name: airflow
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PSQL_USER}:${PSQL_PASSWORD}@postgres/${PSQL_TRANSACTIONS_DB}
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "${AIRFLOW_USER}"
      _AIRFLOW_WWW_USER_PASSWORD: "${AIRFLOW_PASSWORD}"
    volumes:
      - /Users/sardorb/Documents/pprocessing_cdc/orchestration/dags:/opt/airflow/dags
      - /Users/sardorb/Documents/pprocessing_cdc/src:/opt/airflow/dags/src
      - airflow_logs:/opt/airflow/logs
    command: bash -c "pip install -r /opt/airflow/dags/src/requirements.txt && airflow standalone"
    networks:
      - cdc_network

  grafana:
    image: grafana/grafana:12.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource   # Official ClickHouse plugin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning   # Auto-provision datasources & dashboards
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - cdc_network

  transaction_consumer:
    build:
      context: ..
      dockerfile: ../implementation-3-pyspark/Dockerfile
    container_name: transaction_consumer
    restart: no
    depends_on:
      kafka_connect:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      CONSUMER_SCRIPT: transaction_consumer.py
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TRANSACTIONS_TOPIC: postgres.main.transactions
      CH_USER: ch_user
      CH_PASSWORD: ch_password
      CH_DB: warehouse
      CH_HOST: clickhouse:8123
    networks:
      - cdc_network

  bank_account_consumer:
    build:
      context: ..
      dockerfile: ../implementation-3-pyspark/Dockerfile
    container_name: bank_account_consumer
    restart: no
    depends_on:
      kafka_connect:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      CONSUMER_SCRIPT: bank_account_consumer.py
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BANK_ACCOUNTS_TOPIC: postgres.main.bank_accounts
      CH_USER: ch_user
      CH_PASSWORD: ch_password
      CH_DB: warehouse
      CH_HOST: clickhouse:8123
    networks:
      - cdc_network

  user_consumer:
    build:
      context: ..
      dockerfile: ../implementation-3-pyspark/Dockerfile
    container_name: user_consumer
    restart: no
    depends_on:
      kafka_connect:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      CONSUMER_SCRIPT: user_consumer.py
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      USERS_TOPIC: postgres.main.users
      CH_USER: ch_user
      CH_PASSWORD: ch_password
      CH_DB: warehouse
      CH_HOST: clickhouse:8123
    networks:
      - cdc_network